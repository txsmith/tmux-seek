patterns:
  - name: URLs
    regex: 'https?://[^\s]+'

  - name: "File:line"
    regex: '[^\s]+:[0-9]+:[0-9]+'

  - name: Git hash
    regex: '[0-9a-f]{7,40}'

  - name: IP address
    regex: '[0-9]{1,3}(\.[0-9]{1,3}){3}'

  - name: File path
    regex: '(/[^\s]+)+'

  - name: Rust error
    regex: 'error\[E[0-9]+\]'

  - name: Python traceback
    regex: 'File "[^\s]+", line [0-9]+'

  - name: UUID
    regex: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
